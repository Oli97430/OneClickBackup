name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ---- Lint & Type Check ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff linter
        run: ruff check src/ tests/ main.py build.py

  # ---- Unit Tests ----
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest>=8.0
      - name: Run tests
        run: pytest tests/ -v --tb=short -q
      - name: Test import sanity
        run: python -c "from src.core.backup import BackupManager; print('OK')"

  # ---- Build EXE ----
  build:
    needs: [lint, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0
      - name: Build EXE
        run: python build.py
      - name: Verify EXE exists
        run: |
          if (!(Test-Path "dist/OneClickBackup.exe")) { exit 1 }
          $size = (Get-Item "dist/OneClickBackup.exe").Length
          Write-Host "EXE size: $($size / 1MB) MB"
        shell: pwsh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OneClickBackup-exe
          path: dist/OneClickBackup.exe
          retention-days: 30

  # ---- Release (on tag push) ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: OneClickBackup-exe
          path: dist/
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "OneClickBackup ${{ steps.version.outputs.VERSION }}"
          body: |
            ## OneClickBackup ${{ steps.version.outputs.VERSION }}

            ### Downloads
            - **OneClickBackup.exe** - Standalone Windows executable (no installation required)

            ### Requirements
            - Windows 10/11 (64-bit)
            - Administrator privileges for disk operations

            ---
            Built automatically by GitHub Actions.
          files: dist/OneClickBackup.exe
          draft: false
          prerelease: false
